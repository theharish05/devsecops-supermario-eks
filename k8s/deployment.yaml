apiVersion: apps/v1
kind: Deployment
metadata:
  name: mario-v2-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mario-v2
  template:
    metadata:
      labels:
        app: mario-v2
    spec:
      containers:
      - name: mario-game
        image: 823729324830.dkr.ecr.us-east-1.amazonaws.com/mario-v2-app-repo:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: mario-v2-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: mario-v2
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
